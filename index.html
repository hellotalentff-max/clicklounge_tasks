<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CLS OS — Tasks Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --slate:#2f4f4f; --teal:#51897d; --gold:#d79068; --cream:#f5f0e8; --danger:#c0544a; --success:#3d8c6e;
  --text:#1e3333; --muted:#6b8080; --light:#f4f7f6; --light2:#e8edec; --white:#fff; --border:#dce5e3;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--light);color:var(--text);min-height:100vh;}
.badge{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:500;}
.b-gold{background:rgba(215,144,104,0.12);color:var(--gold);}
.b-teal{background:rgba(81,137,125,0.12);color:var(--teal);}
button{cursor:pointer;border:none;font-family:inherit;}
.btn{padding:8px 16px;border-radius:8px;font-weight:500;font-size:13px;transition:all .15s;}
.btn-teal{background:var(--teal);color:#fff;} .btn-teal:hover{background:#3d6b61;}
.btn-gold{background:var(--gold);color:#fff;} .btn-gold:hover{background:#c07b52;}
.btn-outline{background:none;border:1.5px solid var(--border);color:var(--text);} .btn-outline:hover{border-color:var(--teal);color:var(--teal);}
.btn-danger{background:var(--danger);color:#fff;font-size:11px;padding:4px 10px;border-radius:6px;}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px;}
.sinput{border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:13px;background:var(--white);width:100%;transition:border .15s;}
.sinput:focus{outline:none;border-color:var(--teal);}
select.sinput{appearance:auto;}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(47,79,79,0.04);}
.ct{font-size:13px;font-weight:600;color:var(--slate);margin-bottom:12px;}
.tm{text-align:center;color:var(--muted);padding:20px;font-size:13px;}
.field{margin-bottom:12px;} .field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.fe{display:flex;gap:8px;justify-content:flex-end;}

/* Header */
.header{background:var(--slate);color:var(--cream);padding:16px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.header h1{font-size:18px;font-weight:700;flex:1;}
.header .sub{font-size:11px;color:rgba(245,240,232,0.6);}

/* Layout */
.main{max-width:1200px;margin:0 auto;padding:20px;}

/* View toggles */
.view-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;overflow-x:auto;padding-bottom:8px;}
@media(max-width:900px){.kanban{grid-template-columns:repeat(5,minmax(200px,1fr));}}
.kanban-col{background:var(--light);border-radius:10px;padding:10px;min-height:300px;}
.kanban-col-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:6px 8px;margin-bottom:8px;border-radius:6px;display:flex;align-items:center;justify-content:space-between;}
.task-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s;}
.task-card:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(47,79,79,0.08);transform:translateY(-1px);}
.tc-title{font-size:13px;font-weight:600;color:var(--slate);margin-bottom:4px;}
.tc-client{font-size:11px;color:var(--muted);margin-bottom:6px;}
.tc-check{width:18px;height:18px;cursor:pointer;accent-color:var(--success);flex-shrink:0;margin-top:2px;}
.tc-done{opacity:.6;background:rgba(58,125,92,0.04);}
.tc-done .tc-title,.tc-done .task-list-item>div>div{text-decoration:line-through;color:var(--muted);}
.tc-meta{display:flex;gap:6px;flex-wrap:wrap;}
.tc-badge{font-size:9px;padding:2px 6px;border-radius:6px;font-weight:500;}

/* List view */
.task-list-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--light2);background:var(--white);transition:background .1s;}
.task-list-item:hover{background:var(--light);}
.task-list-item:first-child{border-radius:10px 10px 0 0;}
.task-list-item:last-child{border-radius:0 0 10px 10px;border-bottom:none;}

/* Filters */
.filter-btn{padding:5px 12px;font-size:11px;border-radius:16px;font-weight:500;background:var(--light);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;}
.filter-btn:hover{border-color:var(--teal);color:var(--teal);}
.filter-btn.active{background:var(--teal);color:#fff;border-color:var(--teal);}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(30,51,51,0.5);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal-ov.open{display:flex;}
.modal-box{background:var(--white);border-radius:14px;padding:24px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(30,51,51,0.2);}

/* Notify */
.notify{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:300;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(-50%) translateY(-20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* Settings bar */
.settings-bar{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📋 Tasks Manager</h1>
    <div class="sub">CLS OS — Studio Workflow</div>
    <div class="sub" id="client-count" style="margin-top:2px;"></div>
    <div class="sub" id="last-sync" style="margin-top:1px;font-size:10px;"></div>
  </div>
  <button class="btn btn-outline" style="color:var(--cream);border-color:rgba(245,240,232,0.3);" onclick="syncAll()">🔄 Sync</button>
  <button class="btn btn-outline" style="color:var(--cream);border-color:rgba(245,240,232,0.3);" onclick="toggleSettings()">⚙ Settings</button>
</div>

<!-- Settings -->
<div class="main">
  <div id="settings-panel" style="display:none;" class="card">
    <div class="ct">⚙ Connection Settings</div>
    <div class="field">
      <label>Apps Script URL <span style="color:var(--muted);font-weight:400;font-size:11px;">(POS / Tasks)</span></label>
      <input type="url" id="task-url" class="sinput" placeholder="https://script.google.com/macros/s/.../exec">
      <div style="font-size:10px;color:var(--muted);margin-top:4px;">Same URL as your CLS OS Control Hub.</div>
    </div>
    <div class="field">
      <label>TimeCommand URL <span style="color:var(--muted);font-weight:400;font-size:11px;">(for staff list)</span></label>
      <input type="url" id="tc-url" class="sinput" placeholder="https://script.google.com/macros/s/.../exec">
      <div style="font-size:10px;color:var(--muted);margin-top:4px;">Your TimeCommand GAS URL. Used to populate the Assigned To dropdown.</div>
    </div>
    <div class="fe">
      <button class="btn btn-teal" onclick="saveSettings()">💾 Save & Sync</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="view-tabs">
    <button class="btn btn-sm btn-teal" id="view-board-btn" onclick="setView('board')">⊞ Board</button>
    <button class="btn btn-sm btn-outline" id="view-list-btn" onclick="setView('list')">☰ List</button>
    <button class="btn btn-sm btn-outline" id="view-archive-btn" onclick="toggleArchived()">📦 Archived</button>
    <button class="btn btn-sm btn-outline" onclick="openReportModal()">📊 Report</button>
    <div style="flex:1;"></div>
    <select id="staff-filter" onchange="setStaffFilter(this.value)" style="padding:5px 10px;font-size:11px;border-radius:16px;border:1px solid var(--border);background:var(--light);min-width:130px;">
      <option value="">All staff</option>
    </select>
    <div style="display:flex;gap:6px;flex-wrap:wrap;" id="filter-bar">
      <button class="filter-btn active" data-f="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-f="new" onclick="setFilter('new')">🆕 New</button>
      <button class="filter-btn" data-f="inprogress" onclick="setFilter('inprogress')">⚙ In Progress</button>
      <button class="filter-btn" data-f="pickup" onclick="setFilter('pickup')">📦 Ready</button>
      <button class="filter-btn" data-f="delivered" onclick="setFilter('delivered')">✓ Delivered</button>
      <button class="filter-btn" data-f="overdue" onclick="setFilter('overdue')">⚠ Overdue</button>
    </div>
    <button class="btn btn-gold" onclick="openNewTask()">+ New Task</button>
  </div>

  <!-- Category filter bar -->
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;padding:0 4px;" id="cat-filter-bar"></div>

  <!-- Staff color legend -->
  <div id="staff-legend" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;padding:10px 12px;background:var(--light);border-radius:10px;border:1px solid var(--border);"></div>

  <!-- 📤 Send Link Queue — separate from kanban, high priority today's deliveries -->
  <div id="sendlink-section" style="display:none;background:linear-gradient(135deg,rgba(215,144,104,0.10),rgba(215,144,104,0.04));border:1.5px solid rgba(215,144,104,0.25);border-radius:12px;padding:14px 16px;margin-bottom:16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:10px;">
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--slate);display:flex;align-items:center;gap:8px;">
          📤 Send Link Queue
          <span id="sendlink-count-badge" style="background:var(--gold);color:#fff;padding:2px 9px;border-radius:10px;font-size:10px;">0</span>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">Day-of-session deliveries — send photos to clients</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <select id="sendlink-filter" onchange="renderSendLinkSection()" style="padding:5px 10px;font-size:11px;border-radius:16px;border:1px solid var(--border);background:#fff;">
          <option value="today">Today</option>
          <option value="overdue">⚠ Overdue</option>
          <option value="upcoming">📅 Upcoming (7 days)</option>
          <option value="open">All Open</option>
          <option value="done">✓ Sent</option>
        </select>
        <button class="btn btn-sm btn-gold" onclick="openNewSendLink()">+ New Send Link</button>
        <button class="btn btn-sm btn-outline" onclick="toggleSendLinkCollapsed()" id="sendlink-collapse-btn">⌃ Collapse</button>
      </div>
    </div>
    <div id="sendlink-list"></div>
  </div>

  <!-- Board view -->
  <div id="board-view">
    <div class="kanban" id="kanban-board"></div>
  </div>

  <!-- List view -->
  <div id="list-view" style="display:none;">
    <div id="task-list"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-ov" id="modal-ov" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-cnt"></div>
</div>

  {id:'marketing', label:'Content & Marketing', icon:'📣'},

var TASKS = [];
var _lastSaveTime = 0;
var CUR_VIEW = 'board';
var CUR_FILTER = 'all';

var CUR_STAFF = '';
var SHOW_ARCHIVED = false;
var CLIENTS = [];
var TC_STAFF = []; // Staff loaded from TimeCommand

// ── Staff color palette ──
// Deterministic color per staff name — colors are visually distinct, photographer-friendly
var STAFF_COLORS = [
  {bg:'#51897d', fg:'#fff'}, // teal
  {bg:'#d79068', fg:'#fff'}, // gold/orange
  {bg:'#5b7bb5', fg:'#fff'}, // blue

  {bg:'#c0544a', fg:'#fff'}, // coral red

function staffColor(name){
  if(!name) return {bg:'#cccccc', fg:'#666'};
  // Override via localStorage map (admin can pick custom colors)
  var customMap = {};
  try { customMap = JSON.parse(localStorage.getItem('cl_staff_colors')||'{}'); } catch(e){}
  if(customMap[name]) return customMap[name];
  // Deterministic hash → palette index
  var h = 0;
  for(var i=0;i<name.length;i++) h = ((h<<5)-h + name.charCodeAt(i)) | 0;
  return STAFF_COLORS[Math.abs(h) % STAFF_COLORS.length];
}

function staffInitials(name){
  if(!name) return '?';
  var parts = String(name).trim().split(/\s+/);
  if(parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}

function staffBadge(name, size){
  if(!name) return '<span style="font-size:10px;color:var(--muted);font-style:italic;">Unassigned</span>';
  var c = staffColor(name);
  size = size || 'normal';
  var pad = size==='small' ? '2px 7px' : '3px 9px';
  var font = size==='small' ? '10px' : '11px';
  return '<span style="display:inline-flex;align-items:center;gap:5px;background:'+c.bg+';color:'+c.fg+';padding:'+pad+';border-radius:10px;font-size:'+font+';font-weight:600;line-height:1.2;">'+
    '<span style="width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.25);display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;">'+staffInitials(name)+'</span>'+
    escHtml(name)+
  '</span>';
}

function staffAvatar(name, size){
  size = size || 24;
  if(!name) return '<span style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:#e0e0e0;color:#999;display:inline-flex;align-items:center;justify-content:center;font-size:'+Math.round(size*0.4)+'px;font-weight:700;flex-shrink:0;">?</span>';
  var c = staffColor(name);
  return '<span title="'+escHtml(name)+'" style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+c.bg+';color:'+c.fg+';display:inline-flex;align-items:center;justify-content:center;font-size:'+Math.round(size*0.4)+'px;font-weight:700;flex-shrink:0;">'+staffInitials(name)+'</span>';
}

// ================================================================
//  UTILS
// ================================================================
function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
function fmt(n){ return (+(n||0)).toLocaleString('en-PH'); }
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr(){ return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}); }
function getUrl(){ return localStorage.getItem('cl_tasks_url') || localStorage.getItem('cl_url') || ''; }
function hasUrl(){ return !!getUrl(); }

function notify(msg, type){
  var el = document.createElement('div');
  el.className = 'notify';
  el.textContent = msg;
  el.style.background = type==='error'?'var(--danger)':type==='info'?'var(--slate)':'var(--success)';
  el.style.color = '#fff';
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 3000);
}

function openModal(html){ document.getElementById('modal-cnt').innerHTML=html; document.getElementById('modal-ov').classList.add('open'); }
function closeModal(){ document.getElementById('modal-ov').classList.remove('open'); }

// ================================================================
//  JSONP gasCall (same as CLS OS)
// ================================================================
function gasCall(action, payload, retryCount){
  if(!retryCount) retryCount = 0;
  return new Promise(function(resolve, reject){
    if(!hasUrl()){ reject(new Error('No URL configured')); return; }
    var cbName = '_gcb_'+uid();
    var timeout = setTimeout(function(){
      delete window[cbName];
      if(retryCount < 2){ resolve(gasCall(action, payload, retryCount+1)); }
      else{ reject(new Error('Timeout')); }
    }, 45000);
    window[cbName] = function(data){
      clearTimeout(timeout);
      delete window[cbName];
      resolve(data);
    };
    // Encode as base64 JSON in 'd' param (matches Code.gs doGet)
    var dataObj = JSON.stringify({action: action, payload: payload||{}});
    var encoded = btoa(unescape(encodeURIComponent(dataObj)));
    var url = getUrl() + '?d='+encodeURIComponent(encoded)+'&callback='+cbName;
    var s = document.createElement('script');
    s.src = url;
    s.onerror = function(){
      clearTimeout(timeout);
      delete window[cbName];
      reject(new Error('Network error'));
    };
    document.body.appendChild(s);
    setTimeout(function(){ try{document.body.removeChild(s);}catch(e){} }, 5000);
  });
}

function loadTasks(){

function saveTasks(){

function loadClients(){
  try{
    var s = localStorage.getItem('cl_tasks_clients');
    if(s) CLIENTS = JSON.parse(s);
  }catch(e){ CLIENTS = []; }

  // Also try reading from CLS OS POS localStorage (same origin on GitHub Pages)
  try{
    var posDB = localStorage.getItem('cl_db');
    if(posDB){
      var parsed = JSON.parse(posDB);
      var existingNames = {};
      CLIENTS.forEach(function(c){ existingNames[(c.fbName||'').toLowerCase()] = true; });

      // Merge clients from POS
      if(Array.isArray(parsed.clients)){
        parsed.clients.forEach(function(c){
          var key = (c.fbName||'').toLowerCase();
          if(key && !existingNames[key]){
            CLIENTS.push(c);
            existingNames[key] = true;
          }
        });
      }

      // Also extract unique names from transactions
      if(Array.isArray(parsed.transactions)){
        parsed.transactions.forEach(function(t){
          var name = (t.clientName||'').trim();
          var key = name.toLowerCase();
          if(key && !existingNames[key]){
            CLIENTS.push({fbName:name, email:'', type:'walkin', added:t.date||''});
            existingNames[key] = true;
          }
        });
      }

      // Also extract from registrations
      if(Array.isArray(parsed.registrations)){
        parsed.registrations.forEach(function(r){
          var key = (r.fbName||'').toLowerCase();
          if(key && !existingNames[key]){
            CLIENTS.push({fbName:r.fbName, email:r.email||'', type:r.arrType||'walkin', added:r.date||''});
            existingNames[key] = true;
          }
        });
      }

      // Also extract from acknowledgements
      if(Array.isArray(parsed.acknowledgements)){
        parsed.acknowledgements.forEach(function(a){
          var key = (a.fbName||'').toLowerCase();
          if(key && !existingNames[key]){
            CLIENTS.push({fbName:a.fbName, email:a.email||'', type:'booked', added:a.date||''});
            existingNames[key] = true;
          }
        });
      }

      saveClients();
    }
  }catch(e){}
}

function saveClients(){
  try{ localStorage.setItem('cl_tasks_clients', JSON.stringify(CLIENTS)); }catch(e){}
}

async function syncAll(){
  if(!hasUrl()){ notify('Set Apps Script URL in Settings','error'); return; }
  notify('Syncing…','info');
  try{
    var r = await gasCall('getAll');
    if(r.ok){
      if(Array.isArray(r.tasks)) { var _del=JSON.parse(localStorage.getItem('cl_tasks_deleted')||'[]'); TASKS = r.tasks.map(function(t){ if(t.due&&!t.dueDate)t.dueDate=t.due; return t; }).filter(function(t){return _del.indexOf(t.id)===-1;}); saveTasks(); }

      // Build complete client list from ALL sources
      var clientMap = {};

      // 1. Clients sheet (primary — has full details)
      if(Array.isArray(r.clients)){
        r.clients.forEach(function(c){
          var key = (c.fbName||'').trim().toLowerCase();
          if(key) clientMap[key] = c;
        });
      }

      // 2. Registrations
      if(Array.isArray(r.registrations)){
        r.registrations.forEach(function(reg){
          var key = (reg.fbName||'').trim().toLowerCase();
          if(key && !clientMap[key]){
            clientMap[key] = { fbName: reg.fbName, email: reg.email||'', type: reg.arrType||'walkin', added: reg.date||'' };
          } else if(key && clientMap[key] && reg.email && !clientMap[key].email){
            clientMap[key].email = reg.email;
          }
        });
      }

      // 3. Transactions
      if(Array.isArray(r.transactions)){
        r.transactions.forEach(function(t){
          var name = (t.clientName||'').trim();
          var key = name.toLowerCase();
          if(key && !clientMap[key]){
            clientMap[key] = { fbName: name, email: '', type: 'walkin', added: t.date||'' };
          }
        });
      }

      // 4. Acknowledgements
      if(Array.isArray(r.acknowledgements)){
        r.acknowledgements.forEach(function(a){
          var key = (a.fbName||'').trim().toLowerCase();
          if(key && !clientMap[key]){
            clientMap[key] = { fbName: a.fbName, email: a.email||'', type: 'booked', added: a.date||'' };
          }
        });
      }

      CLIENTS = Object.keys(clientMap).map(function(k){ return clientMap[k]; });
      saveClients();

      notify('Synced ✓ — '+TASKS.length+' tasks, '+CLIENTS.length+' clients','success');
      updateClientCount();
      updateLastSync();
      render();
    } else {
      notify('Sync failed: '+(r.error||'Unknown'),'error');
    }
  }catch(e){
    notify('Sync error: '+e.message+' — trying clients only…','error');
    // Fallback: try fetching just clients
    try{
      var r2 = await gasCall('getClients');
      if(r2.ok && Array.isArray(r2.data)){
        CLIENTS = r2.data;
        saveClients();
        updateClientCount();
        notify('Loaded '+CLIENTS.length+' clients ✓','success');
      }
    }catch(e2){}
  }
}

async function pushTask(task, isNew){
  _lastSaveTime = Date.now();
  saveTasks();
  if(hasUrl()){
    try{
      if(isNew){
        await gasCall('saveTask', task);
      } else {
        await gasCall('updateTask', task);
      }
    }catch(e){
      console.log('Push failed, will sync later:', e.message);
    }
  }
}

    s.src = url + '&callback=' + cb;
    s.onerror = function(){ clearTimeout(tm); delete window[cb]; s.remove(); };
    document.body.appendChild(s);
  } catch(e){}
}

// Migrate any 'review' stage tasks (from before review was removed) to 'inprogress'
function migrateLegacyStages(){
  var changed = false;
  (TASKS||[]).forEach(function(t){
    if(t.stage === 'review'){ t.stage = 'inprogress'; changed = true; }
  });
  if(changed) saveTasks();
}

// Auto-promote 'new' tasks to 'inprogress' when due within 7 days
function autoPromoteTasks(){
  var today = todayStr();
  var sevenDays = new Date();
  sevenDays.setDate(sevenDays.getDate() + 7);
  var weekFromNow = sevenDays.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
  var changed = false;
  (TASKS||[]).forEach(function(t){
    if(t.archived) return;
    if(t.stage !== 'new') return;
    if(!t.dueDate) return;
    // If due date is between today and 7 days from now → promote
    if(t.dueDate <= weekFromNow){
      t.stage = 'inprogress';
      t.updatedAt = nowTs();
      changed = true;
    }
  });
  if(changed) saveTasks();
}

// ── SEND LINK QUEUE — separate section for day-of-session deliveries ──
var SENDLINK_COLLAPSED = false;

function renderSendLinkSection(){
  var section = document.getElementById('sendlink-section');
  if(!section) return;
  var allSendlinks = (TASKS||[]).filter(function(t){ return t.type === 'sendlink' && !t.archived; });
  // Show the badge with open count
  var openCount = allSendlinks.filter(function(t){ return t.stage !== 'delivered'; }).length;
  var badge = document.getElementById('sendlink-count-badge');
  if(badge){ badge.textContent = openCount; badge.style.background = openCount?'var(--gold)':'var(--muted)'; }

  // Always show section so users can add the first send-link
  section.style.display = '';

  var listEl = document.getElementById('sendlink-list');
  if(SENDLINK_COLLAPSED){ listEl.innerHTML = ''; return; }

  var filter = (document.getElementById('sendlink-filter')||{}).value || 'today';
  var today = todayStr();
  var weekAhead = new Date(); weekAhead.setDate(weekAhead.getDate()+7);
  var weekStr = weekAhead.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});

  var tasks = allSendlinks.slice();
  if(filter === 'today'){
    tasks = tasks.filter(function(t){ return t.stage !== 'delivered' && (t.dueDate === today || (!t.dueDate)); });
  } else if(filter === 'overdue'){
    tasks = tasks.filter(function(t){ return t.stage !== 'delivered' && t.dueDate && t.dueDate < today; });
  } else if(filter === 'upcoming'){
    tasks = tasks.filter(function(t){ return t.stage !== 'delivered' && t.dueDate && t.dueDate > today && t.dueDate <= weekStr; });
  } else if(filter === 'open'){
    tasks = tasks.filter(function(t){ return t.stage !== 'delivered'; });
  } else if(filter === 'done'){
    tasks = tasks.filter(function(t){ return t.stage === 'delivered'; });
  }

  // Sort: overdue first (oldest due first), then today, then upcoming, then done at bottom
  tasks.sort(function(a,b){
    if(a.stage === 'delivered' && b.stage !== 'delivered') return 1;
    if(b.stage === 'delivered' && a.stage !== 'delivered') return -1;
    var da = a.dueDate || '9999-12-31';
    var db = b.dueDate || '9999-12-31';
    return da.localeCompare(db);
  });

  if(!tasks.length){
    var emptyMsg = filter==='today' ? '✨ No deliveries needed today.' :
                   filter==='overdue' ? '✓ No overdue send-links.' :
                   filter==='done' ? 'No deliveries marked sent yet.' :
                   'Nothing matches this filter.';
    listEl.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:14px;text-align:center;background:#fff;border-radius:8px;">'+emptyMsg+'</div>';
    return;
  }

  listEl.innerHTML = tasks.map(function(t){
    var isOverdue = t.dueDate && t.dueDate < today && t.stage !== 'delivered';
    var isToday = t.dueDate === today && t.stage !== 'delivered';
    var isDone = t.stage === 'delivered' || t.done;
    var sc = staffColor(t.assignedTo);
    var bgRow = isDone ? '#f8faf9' : isOverdue ? 'rgba(192,84,74,0.06)' : isToday ? '#fff' : '#fff';
    var dueLabel = '';
    if(t.dueDate){
      if(t.dueDate === today) dueLabel = '<span style="color:var(--gold);font-weight:700;">📅 TODAY</span>';
      else if(isOverdue){
        var days = Math.floor((new Date(today)-new Date(t.dueDate))/(1000*60*60*24));
        dueLabel = '<span style="color:var(--danger);font-weight:700;">⚠ '+days+'d overdue</span>';
      } else {
        dueLabel = '<span style="color:var(--muted);">📅 '+t.dueDate+'</span>';
      }
    }
    return '<div onclick="openTaskDetail(\''+t.id+'\')" style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:'+bgRow+';border:1px solid var(--border);border-left:4px solid '+(t.assignedTo?sc.bg:'#d0d0d0')+';border-radius:8px;margin-bottom:6px;cursor:pointer;'+(isDone?'opacity:.55;':'')+'">'+
      '<input type="checkbox" class="tc-check" '+(isDone?'checked':'')+' onclick="event.stopPropagation();toggleTaskDone(\''+t.id+'\',this.checked);" title="Mark sent">'+
      staffAvatar(t.assignedTo, 26)+
      '<div style="flex:1;min-width:0;'+(isDone?'text-decoration:line-through;':'')+'">'+
        '<div style="font-size:12px;font-weight:600;color:var(--slate);">📤 '+escHtml(t.client||'(no client)')+(t.title?' — '+escHtml(t.title):'')+'</div>'+
        '<div style="font-size:10px;color:var(--muted);margin-top:1px;">'+
          (t.assignedTo?escHtml(t.assignedTo)+' · ':'')+
          dueLabel+
          (t.completedAt?' · ✓ Sent '+fmtTs(t.completedAt):'')+
        '</div>'+
      '</div>'+
      (t.driveLink ? '<a href="'+escHtml(t.driveLink)+'" target="_blank" onclick="event.stopPropagation()" class="btn btn-sm btn-teal" style="text-decoration:none;padding:5px 10px;font-size:10px;flex-shrink:0;">📂 Drive</a>' : '')+
      (!isDone && t.driveLink ? '<button onclick="event.stopPropagation();sendDriveLink(\''+t.id+'\')" class="btn btn-sm btn-gold" style="padding:5px 10px;font-size:10px;flex-shrink:0;">📤 Send</button>' : '')+
    '</div>';
  }).join('');
}

function getFilteredTasks(){
  var tasks = TASKS.filter(function(t){
    if(SHOW_ARCHIVED) return t.archived;
    return !t.archived;
  });
  // Always exclude sendlink from main board — they live in their own section
  tasks = tasks.filter(function(t){ return t.type !== 'sendlink'; });
  if(CUR_FILTER !== 'all'){
    if(CUR_FILTER === 'overdue'){
      var today = todayStr();
      tasks = tasks.filter(function(t){ return t.dueDate && t.dueDate < today && t.stage !== 'delivered'; });
    } else {
      tasks = tasks.filter(function(t){ return t.stage === CUR_FILTER; });
    }
  }
  if(CUR_CATEGORY !== 'all'){
    tasks = tasks.filter(function(t){
      var tc = (TASK_TYPES[t.type] && TASK_TYPES[t.type].category) || 'other';
      return tc === CUR_CATEGORY;
    });
  }
  if(CUR_STAFF){
    if(CUR_STAFF === '__unassigned') tasks = tasks.filter(function(t){ return !t.assignedTo; });
    else tasks = tasks.filter(function(t){ return t.assignedTo === CUR_STAFF; });
  }
  return tasks;
}

function renderList(){

  var tasks = getFilteredTasks();
  var today = todayStr();

  if(!tasks.length){ el.innerHTML='<div class="tm">No tasks found.</div>'; return; }

  var html = '';
  tasks.sort(function(a,b){
    var sa = STAGES.findIndex(function(s){return s.id===a.stage;});
    var sb = STAGES.findIndex(function(s){return s.id===b.stage;});

  tasks.forEach(function(t){

    if(t.completedAt) ts += '  ·  ✓ '+fmtTs(t.completedAt);
    html += '<div class="task-list-item'+(isDone?' tc-done':'')+'" data-tid="'+t.id+'" style="border-left:4px solid '+stripeColor+';" onclick="openTaskDetail(this.dataset.tid)">'+
      '<input type="checkbox" class="tc-check" '+(isDone?'checked':'')+' onclick="event.stopPropagation();toggleTaskDone(\''+t.id+'\',this.checked);" title="Mark done">'+

        '<div style="font-weight:600;font-size:13px;color:var(--slate);">'+type.icon+' '+escHtml(type.label)+'</div>'+

        '<div style="font-size:10px;color:var(--muted);margin-top:2px;">'+escHtml(t.client||'—')+

  el.innerHTML = '<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;">'+html+'</div>';

  var d = new Date();

    '<h3 style="margin-bottom:6px;">📊 Staff Productivity Report</h3>'+
    '<div style="font-size:11px;color:var(--muted);margin-bottom:14px;">Track who completes what — by category, on-time rate, throughput.</div>'+
    '<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;background:var(--light);padding:10px;border-radius:8px;">'+
      '<label style="font-size:11px;color:var(--muted);">From:</label>'+
      '<input type="date" id="rep-from" class="sinput" value="'+monthStart+'" style="max-width:150px;" onchange="renderReportBody()">'+
      '<label style="font-size:11px;color:var(--muted);">To:</label>'+
      '<input type="date" id="rep-to" class="sinput" value="'+today+'" style="max-width:150px;" onchange="renderReportBody()">'+
      '<button class="btn btn-sm btn-outline" onclick="setReportRange(\'week\')">This Week</button>'+
      '<button class="btn btn-sm btn-outline" onclick="setReportRange(\'month\')">This Month</button>'+
      '<button class="btn btn-sm btn-outline" onclick="setReportRange(\'all\')">All Time</button>'+
    '</div>'+

      '<button class="btn btn-outline" onclick="closeModal()">Close</button>'+

function setReportRange(p){
  var d = new Date();
  var to = todayStr();
  var from = to;
  if(p==='week'){
    var dt = new Date(); dt.setDate(dt.getDate()-7);
    from = dt.toISOString().slice(0,10);
  } else if(p==='month'){
    from = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01';
  } else if(p==='all'){
    from = '2020-01-01';
  }
  document.getElementById('rep-from').value = from;
  document.getElementById('rep-to').value = to;
  renderReportBody();
}

function renderReportBody(){
  var from = document.getElementById('rep-from').value;
  var to = document.getElementById('rep-to').value;
  var today = todayStr();

  // Filter tasks by createdAt within range, AND any task completed within range
  var all = (TASKS||[]).filter(function(t){ return !t.archived; });
  var inRange = all.filter(function(t){
    var d = (t.createdAt || t.updatedAt || '').slice(0,10);
    return d >= from && d <= to;
  });

  // KPIs
  var total = inRange.length;
  var done = inRange.filter(function(t){ return t.stage === 'delivered'; }).length;
  var open = inRange.filter(function(t){ return t.stage !== 'delivered'; }).length;
  var overdue = all.filter(function(t){ return t.stage !== 'delivered' && t.dueDate && t.dueDate < today; }).length;
  var unassigned = all.filter(function(t){ return t.stage !== 'delivered' && !t.assignedTo; }).length;
  var completion = total ? Math.round(done/total*100) : 0;
  // On-time delivery (delivered AND updatedAt <= dueDate)
  var onTime = inRange.filter(function(t){
    return t.stage === 'delivered' && t.dueDate && t.updatedAt && t.updatedAt <= t.dueDate;
  }).length;
  var onTimeRate = done ? Math.round(onTime/done*100) : 0;

  var kpis = [
    {l:'Total',         v:total,        c:'var(--teal)'},
    {l:'Completed',     v:done,         c:'var(--success)'},
    {l:'Completion %',  v:completion+'%', c:completion>=80?'var(--success)':completion>=50?'var(--gold)':'var(--danger)'},
    {l:'On-Time %',     v:onTimeRate+'%', c:onTimeRate>=80?'var(--success)':'var(--gold)'},
    {l:'Open',          v:open,         c:'var(--slate)'},
    {l:'Overdue',       v:overdue,      c:overdue?'var(--danger)':'var(--muted)'},
    {l:'Unassigned',    v:unassigned,   c:unassigned?'var(--gold)':'var(--muted)'}
  ];

  // Staff performance
  var staffMap = {};
  inRange.forEach(function(t){
    var who = t.assignedTo || '— Unassigned —';
    if(!staffMap[who]) staffMap[who] = {assigned:0, done:0, open:0, overdue:0, onTime:0, byCat:{}};
    staffMap[who].assigned++;
    var cat = (TASK_TYPES[t.type] && TASK_TYPES[t.type].category) || 'other';
    staffMap[who].byCat[cat] = (staffMap[who].byCat[cat]||0)+1;
    if(t.stage === 'delivered'){
      staffMap[who].done++;
      if(t.dueDate && t.updatedAt && t.updatedAt <= t.dueDate) staffMap[who].onTime++;
    } else {
      staffMap[who].open++;
      if(t.dueDate && t.dueDate < today) staffMap[who].overdue++;
    }
  });
  var staffArr = Object.keys(staffMap).map(function(name){
    var s = staffMap[name];
    return {
      name:name, assigned:s.assigned, done:s.done, open:s.open, overdue:s.overdue,
      completionRate: s.assigned ? Math.round(s.done/s.assigned*100) : 0,
      onTimeRate: s.done ? Math.round(s.onTime/s.done*100) : 0,
      byCat: s.byCat
    };
  }).sort(function(a,b){ return b.done - a.done; });

  // Category breakdown
  var catMap = {};
  inRange.forEach(function(t){
    var cat = (TASK_TYPES[t.type] && TASK_TYPES[t.type].category) || 'other';
    if(!catMap[cat]) catMap[cat] = {total:0, done:0};
    catMap[cat].total++;
    if(t.stage === 'delivered') catMap[cat].done++;
  });
  var catLabels = {};
  TASK_CATEGORIES.forEach(function(c){ catLabels[c.id] = c.icon+' '+c.label; });

  var html =
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:18px;">'+
    kpis.map(function(k){
      return '<div style="background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;">'+
        '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;">'+k.l+'</div>'+
        '<div style="font-size:18px;font-weight:700;color:'+k.c+';">'+k.v+'</div>'+
      '</div>';
    }).join('')+
    '</div>'+

    '<div style="font-size:13px;font-weight:700;margin-bottom:8px;">👥 Staff Performance</div>'+
    (staffArr.length ?
      '<div style="overflow-x:auto;margin-bottom:18px;"><table style="width:100%;border-collapse:collapse;font-size:12px;">'+
        '<thead><tr style="background:var(--light);"><th style="text-align:left;padding:8px;">Staff</th><th style="padding:8px;">Assigned</th><th style="padding:8px;">Done</th><th style="padding:8px;">Open</th><th style="padding:8px;">Overdue</th><th style="padding:8px;">Completion</th><th style="padding:8px;">On-Time</th></tr></thead>'+
        '<tbody>'+
        staffArr.map(function(s){
          var rc = s.completionRate>=80?'var(--success)':s.completionRate>=50?'var(--gold)':'var(--danger)';
          var oc = s.onTimeRate>=80?'var(--success)':s.onTimeRate>=50?'var(--gold)':'var(--danger)';
          return '<tr style="border-top:1px solid var(--border);">'+
            '<td style="padding:8px;font-weight:600;">'+escHtml(s.name)+'</td>'+
            '<td style="padding:8px;text-align:center;">'+s.assigned+'</td>'+
            '<td style="padding:8px;text-align:center;color:var(--success);font-weight:600;">'+s.done+'</td>'+
            '<td style="padding:8px;text-align:center;">'+s.open+'</td>'+
            '<td style="padding:8px;text-align:center;color:'+(s.overdue?'var(--danger);font-weight:600':'var(--muted)')+'">'+s.overdue+'</td>'+
            '<td style="padding:8px;text-align:center;color:'+rc+';font-weight:600;">'+s.completionRate+'%</td>'+
            '<td style="padding:8px;text-align:center;color:'+oc+';font-weight:600;">'+(s.done?s.onTimeRate+'%':'—')+'</td>'+
          '</tr>';
        }).join('')+
        '</tbody></table></div>'
      : '<p style="color:var(--muted);font-size:12px;padding:12px;text-align:center;background:var(--light);border-radius:8px;margin-bottom:18px;">No tasks in this range.</p>')+

    '<div style="font-size:13px;font-weight:700;margin-bottom:8px;">📊 By Category</div>'+
    (Object.keys(catMap).length ?
      '<div style="margin-bottom:18px;">'+
      Object.keys(catMap).map(function(c){
        var d = catMap[c];
        var pct = d.total ? Math.round(d.done/d.total*100) : 0;
        return '<div style="margin-bottom:10px;">'+
          '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">'+
            '<span><strong>'+(catLabels[c]||c)+'</strong></span>'+
            '<span style="color:var(--muted);">'+d.done+'/'+d.total+' ('+pct+'%)</span>'+
          '</div>'+
          '<div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;"><div style="height:100%;width:'+pct+'%;background:var(--teal);"></div></div>'+
        '</div>';
      }).join('')+
      '</div>'
      : '');

  document.getElementById('rep-body').innerHTML = html;
}

function openTaskDetail(id){
  var t = id ? TASKS.find(function(x){return x.id===id;}) : null;
  var isNew = !t;

  var sortedClients = CLIENTS.slice().sort(function(a,b){ return (a.fbName||'').localeCompare(b.fbName||''); });
  var clientOpts = '<option value="">— Select client ('+sortedClients.length+' available) —</option>';
  sortedClients.forEach(function(c){
    var sel = (t && t.client === c.fbName) ? ' selected' : '';
    var label = escHtml(c.fbName||'');
    if(c.email) label += ' — '+escHtml(c.email);
    clientOpts += '<option value="'+escHtml(c.fbName)+'"'+sel+'>'+label+'</option>';
  });

  var typeOpts = '';
  // Group types by category for cleaner dropdown
  var byCat = {};
  Object.keys(TASK_TYPES).forEach(function(k){
    var cat = TASK_TYPES[k].categoryLabel || 'Other';
    if(!byCat[cat]) byCat[cat] = [];
    byCat[cat].push({key:k, type:TASK_TYPES[k]});
  });
  Object.keys(byCat).forEach(function(catLabel){
    typeOpts += '<optgroup label="'+escHtml(catLabel)+'">';
    byCat[catLabel].forEach(function(item){
      var sel = (t && t.type === item.key) ? ' selected' : '';
      typeOpts += '<option value="'+item.key+'"'+sel+'>'+item.type.icon+' '+item.type.label+'</option>';
    });
    typeOpts += '</optgroup>';
  });

  // Build staff dropdown from TimeCommand
  var staffOpts = '<option value="">— Unassigned —</option>';
  var staffNames = TC_STAFF.map(function(s){ return s.name; });
  // Also include any assigned names not in TC_STAFF
  (TASKS||[]).forEach(function(task){
    if(task.assignedTo && staffNames.indexOf(task.assignedTo)===-1) staffNames.push(task.assignedTo);
  });
  if(t && t.assignedTo && staffNames.indexOf(t.assignedTo)===-1) staffNames.push(t.assignedTo);
  staffNames.sort();
  staffNames.forEach(function(n){
    var sel = (t && t.assignedTo === n) ? ' selected' : '';
    staffOpts += '<option value="'+escHtml(n)+'"'+sel+'>'+escHtml(n)+'</option>';
  });

  var stageOpts = '';
  STAGES.forEach(function(s){
    var sel = (t && t.stage === s.id) ? ' selected' : '';
    stageOpts += '<option value="'+s.id+'"'+sel+'>'+s.label+'</option>';
  });

  // Timestamps panel (only for existing tasks)
  var tsPanel = '';
  if(t){
    var rows = [];
    if(t.createdAt)   rows.push('<div><span style="color:var(--muted);font-size:10px;">🕐 Created:</span> <strong>'+fmtTs(t.createdAt)+'</strong></div>');
    if(t.updatedAt && t.updatedAt !== t.createdAt) rows.push('<div><span style="color:var(--muted);font-size:10px;">✏ Last updated:</span> <strong>'+fmtTs(t.updatedAt)+'</strong></div>');
    if(t.completedAt) rows.push('<div><span style="color:var(--success);font-size:10px;">✓ Completed:</span> <strong>'+fmtTs(t.completedAt)+'</strong></div>');
    if(t.createdAt && t.completedAt){
      try {
        var c = new Date(t.createdAt), d = new Date(t.completedAt);
        var hours = (d-c)/(1000*60*60);
        var label = hours < 1 ? Math.round(hours*60)+' min' :
                    hours < 24 ? hours.toFixed(1)+' hours' :
                    (hours/24).toFixed(1)+' days';
        rows.push('<div style="margin-top:4px;padding-top:6px;border-top:1px dashed var(--border);"><span style="color:var(--muted);font-size:10px;">⏱ Duration:</span> <strong style="color:var(--teal);">'+label+'</strong></div>');
      } catch(e){}
    }
    if(rows.length){
      tsPanel = '<div style="background:var(--light);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;line-height:1.7;">'+rows.join('')+'</div>';
    }
  }

  var html =
    '<h3 style="margin-bottom:16px;">'+(isNew?'+ New Task':'✏ Edit Task')+'</h3>'+
    tsPanel +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'+
      '<div class="field"><label>Type *</label>'+
        '<select id="td-type" class="sinput">'+typeOpts+'</select></div>'+
      '<div class="field"><label>Client</label>'+
        '<select id="td-client" class="sinput" onchange="showTaskClientInfo()">'+clientOpts+'</select></div>'+
    '</div>'+
    '<div class="field"><label>Description <span style="color:var(--muted);font-weight:400;font-size:11px;">(optional — auto-filled from Type if blank)</span></label>'+
      '<input type="text" id="td-title" class="sinput" value="'+escHtml(t?t.title:'')+'" placeholder="Optional extra detail e.g. specific shoot date or instructions"></div>'+
    '<div id="td-client-info" style="display:none;background:var(--light);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;"></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'+
      '<div class="field"><label>Stage</label>'+
        '<select id="td-stage" class="sinput">'+stageOpts+'</select></div>'+
      '<div class="field"><label>Due Date</label>'+
        '<input type="date" id="td-due" class="sinput" value="'+(t?t.dueDate||'':'')+'"></div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'+
      '<div class="field"><label>Priority</label>'+
        '<select id="td-priority" class="sinput">'+
          '<option value="normal"'+((t&&t.priority==='normal')||!t?' selected':'')+'>Normal</option>'+
          '<option value="high"'+(t&&t.priority==='high'?' selected':'')+'>🔴 High</option>'+
          '<option value="low"'+(t&&t.priority==='low'?' selected':'')+'>Low</option>'+
        '</select></div>'+
      '<div class="field"><label>Assigned To</label>'+
        '<select id="td-assigned" class="sinput">'+staffOpts+'</select></div>'+
    '</div>'+
    '<div class="field"><label>Google Drive Link</label>'+
      '<div style="display:flex;gap:8px;">'+
        '<input type="url" id="td-drive" class="sinput" value="'+escHtml(t?t.driveLink||'':'')+'" placeholder="https://drive.google.com/..." style="flex:1;">'+
        '<a id="td-drive-open" href="'+(t&&t.driveLink?escHtml(t.driveLink):'#')+'" target="_blank" class="btn btn-sm btn-teal" style="white-space:nowrap;text-decoration:none;padding:8px 12px;display:'+(t&&t.driveLink?'inline-flex':'none')+';">📂 Open</a>'+
      '</div></div>'+
    buildSendSection(t)+
    '<div class="field"><label>Notes</label>'+
      '<textarea id="td-notes" class="sinput" rows="3" style="resize:vertical;">'+escHtml(t?t.notes||'':'')+'</textarea></div>'+
    '<div class="fe" style="justify-content:space-between;">'+
      (t ? '<div style="display:flex;gap:6px;">'+
        '<button class="btn btn-sm btn-outline" id="td-archive-btn">\ud83d\udce6 '+(t.archived?'Unarchive':'Archive')+'</button>'+
        '<button class="btn btn-danger" id="td-delete-btn">\ud83d\uddd1 Delete</button>'+
      '</div>' : '<div></div>')+
      '<div style="display:flex;gap:8px;">'+
        '<button class="btn btn-outline" id="td-cancel-btn">Cancel</button>'+
        '<button class="btn btn-teal" id="td-save-btn">\ud83d\udcbe '+(isNew?'Create Task':'Save Changes')+'</button>'+
      '</div>'+
    '</div>';

  openModal(html);

  // Wire buttons
  setTimeout(function(){
    document.getElementById('td-cancel-btn').addEventListener('click', closeModal);
    document.getElementById('td-save-btn').addEventListener('click', function(){ saveTask(t?t.id:null); });
    if(t){
      document.getElementById('td-archive-btn').addEventListener('click', function(){ archiveTask(t.id); });
      document.getElementById('td-delete-btn').addEventListener('click', function(){ deleteTask(t.id); });
    }
    // Show client info if editing existing task
    showTaskClientInfo();
    // Wire send link button
    var sendBtn = document.getElementById('td-send-link');
    if(sendBtn) sendBtn.addEventListener('click', function(){ sendDriveLink(t.id); });
    // Update Open button when drive link changes
    var driveInput = document.getElementById('td-drive');
    var openBtn = document.getElementById('td-drive-open');
    if(driveInput && openBtn){
      driveInput.addEventListener('input', function(){
        var val = driveInput.value.trim();
        if(val){
          openBtn.href = val;
          openBtn.style.display = 'inline-flex';
        } else {
          openBtn.style.display = 'none';
        }
      });
    }
  }, 50);
}

async function sendDriveLink(taskId){
  var t = TASKS.find(function(x){ return x.id===taskId; });
  if(!t || !t.driveLink || !t.client){ notify('Missing drive link or client','error'); return; }
  var cl = CLIENTS.find(function(c){ return c.fbName===t.client; });
  if(!cl || !cl.email){ notify('No email on file for '+t.client,'error'); return; }

  var btn = document.getElementById('td-send-link');
  if(btn){ btn.disabled=true; btn.textContent='Sending...'; }

  try{
    var result = await gasCall('sendDriveLink', {
      email: cl.email,
      clientName: t.client,
      driveLink: t.driveLink,
      taskTitle: t.title||'Your photos',
      taskId: t.id
    });
    if(result.ok){
      t.driveLinkSentDate = todayStr();
      pushTask(t, false);
      notify('Drive link sent to '+cl.email+' with save reminders!','success');
      closeModal();
      openTaskDetail(taskId);
    } else {
      notify('Send failed: '+(result.error||'Unknown'),'error');
      if(btn){ btn.disabled=false; btn.textContent='\ud83d\udce4 Send Link + Set Reminders'; }
    }
  }catch(e){
    notify('Error: '+e.message,'error');
    if(btn){ btn.disabled=false; btn.textContent='\ud83d\udce4 Send Link + Set Reminders'; }
  }
}

function nowTs(){
  // ISO timestamp in Philippine time
  var d = new Date();
  var t = d.toLocaleString('en-CA', {timeZone:'Asia/Manila', hour12:false}).replace(', ','T');
  return t; // e.g. "2026-06-21T14:35:22"
}
function fmtTs(ts){
  if(!ts) return '';
  // Convert ISO timestamp to "Jun 21, 2:35pm" style
  try {
    var s = String(ts);
    var datePart, timePart;
    if(s.indexOf('T')>-1){ datePart = s.split('T')[0]; timePart = s.split('T')[1]||''; }
    else if(s.indexOf(' ')>-1){ datePart = s.split(' ')[0]; timePart = s.split(' ')[1]||''; }
    else { datePart = s; timePart = ''; }
    var parts = datePart.split('-');
    if(parts.length<3) return s;
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var label = months[parseInt(parts[1])-1]+' '+parseInt(parts[2]);
    if(timePart){
      var hm = timePart.split(':');
      var h = parseInt(hm[0]), m = hm[1]||'00';
      var ampm = h>=12?'pm':'am';
      var h12 = h%12; if(h12===0) h12=12;
      label += ', '+h12+':'+m+ampm;
    }
    return label;
  } catch(e){ return ts; }
}

function saveTask(existingId){
  var title    = (document.getElementById('td-title').value||'').trim();
  var client   = document.getElementById('td-client').value||'';
  var type     = document.getElementById('td-type').value||'other';
  var stage    = document.getElementById('td-stage').value||'new';
  var dueDate  = document.getElementById('td-due').value||'';
  var priority = document.getElementById('td-priority').value||'normal';
  var assigned = (document.getElementById('td-assigned').value||'').trim();
  var driveLink= (document.getElementById('td-drive').value||'').trim();
  var notes    = (document.getElementById('td-notes').value||'').trim();

  // Title is now optional — Type serves as the standard title
  // If no title given, fall back to type label
  if(!title){
    var tp = TASK_TYPES[type]||TASK_TYPES.other;
    title = tp.label + (client ? ' — '+client : '');
  }

  var now = nowTs();

  if(existingId){
    var t = TASKS.find(function(x){return x.id===existingId;});
    if(t){
      var wasDelivered = (t.stage === 'delivered');
      var nowDelivered = (stage === 'delivered');
      t.title = title; t.client = client; t.type = type; t.stage = stage;
      t.dueDate = dueDate; t.due = dueDate; t.priority = priority; t.assignedTo = assigned;
      t.driveLink = driveLink; t.notes = notes; t.updatedAt = now;
      // Track completion timestamp
      if(nowDelivered && !wasDelivered) t.completedAt = now;
      else if(!nowDelivered && wasDelivered) t.completedAt = '';
      // Ensure createdAt exists for legacy tasks
      if(!t.createdAt) t.createdAt = now;
      pushTask(t, false);
      notify('Task updated ✓','success');
    }
  } else {
    var task = {
      id: uid(), title: title, client: client, type: type, stage: stage,
      dueDate: dueDate, priority: priority, assignedTo: assigned,
      driveLink: driveLink, notes: notes,
      createdAt: now, updatedAt: now,
      completedAt: (stage === 'delivered' ? now : ''),
      archived: false, due: dueDate
    };
    TASKS.push(task);
    pushTask(task, true);
    notify('Task created ✓','success');
  }
  closeModal();
  render();
}

// ── Toggle done from checkbox on the card itself ──
function toggleTaskDone(id, isDone){
  var t = TASKS.find(function(x){return x.id===id;});
  if(!t) return;
  var now = nowTs();
  if(isDone){
    t.stage = 'delivered';
    t.done = true;
    if(!t.completedAt) t.completedAt = now;
  } else {
    // Move back to "new" or whichever previous stage; default to new
    t.stage = 'new';
    t.done = false;
    t.completedAt = '';
  }
  if(!t.createdAt) t.createdAt = now;
  t.updatedAt = now;
  pushTask(t, false);
  render();
}

function archiveTask(id){
  var t = TASKS.find(function(x){return x.id===id;});
  if(!t) return;
  t.archived = t.archived ? false : true;
  t.updatedAt = todayStr();
  pushTask(t, false);
  closeModal();
  render();
  notify(t.archived?'Task archived':'Task restored','success');
}

function deleteTask(id){
  if(!confirm('Delete this task permanently?')) return;
  _lastSaveTime = Date.now();
  TASKS = TASKS.filter(function(x){return x.id!==id;});
  // Track deleted IDs so silentSync can't restore them
  var deleted = JSON.parse(localStorage.getItem('cl_tasks_deleted')||'[]');
  if(deleted.indexOf(id) === -1) deleted.push(id);
  // Keep only last 200 deleted IDs
  if(deleted.length > 200) deleted = deleted.slice(-200);
  localStorage.setItem('cl_tasks_deleted', JSON.stringify(deleted));
  saveTasks();
  if(hasUrl()) gasCall('deleteRow',{sheet:'Tasks',id:id}).catch(function(){});
  closeModal();
  render();
  notify('Task deleted','info');
}

function moveTaskStage(id, newStage){
  var t = TASKS.find(function(x){return x.id===id;});
  if(!t) return;
  t.stage = newStage;
  t.updatedAt = todayStr();
  pushTask(t, false);
  render();
}

function showTaskClientInfo(){
  var name = document.getElementById('td-client')?.value||'';
  var infoEl = document.getElementById('td-client-info');
  if(!infoEl) return;
  if(!name){ infoEl.style.display='none'; return; }
  var c = CLIENTS.find(function(x){ return x.fbName===name; });
  if(!c){ infoEl.style.display='none'; return; }
  infoEl.style.display='';
  infoEl.innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;">'+
      '<div style="width:36px;height:36px;border-radius:50%;background:var(--slate);color:var(--cream);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">'+
        name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase()+
      '</div>'+
      '<div style="flex:1;">'+
        '<div style="font-weight:600;color:var(--slate);">'+escHtml(name)+'</div>'+
        '<div style="color:var(--muted);font-size:11px;">'+
          (c.email ? '✉ '+escHtml(c.email) : 'No email')+
          (c.phone ? ' · 📱 '+escHtml(c.phone) : '')+
          (c.type ? ' · '+c.type : '')+
        '</div>'+
      '</div>'+
    '</div>';
}

function updateClientCount(){
  var el = document.getElementById('client-count');
  if(el) el.textContent = CLIENTS.length+' clients synced';
}

function updateLastSync(){
  var el = document.getElementById('last-sync');
  if(el){
    var now = new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'});
    el.textContent = 'Last synced: '+now;
  }
}

loadTasks();
loadClients();
updateClientCount();

var urlEl = document.getElementById('task-url');
if(urlEl) urlEl.value = getUrl();
var tcUrlEl = document.getElementById('tc-url');
if(tcUrlEl) tcUrlEl.value = localStorage.getItem('cl_tc_url') || '';

if(!hasUrl()){
  document.getElementById('settings-panel').style.display = '';
}

loadTimeCommandStaff();

// Sync on load
if(hasUrl()) syncAll();

// Auto-sync every 30 seconds so all staff see updates
var _syncInterval = null;
function startAutoSync(){
  if(_syncInterval) clearInterval(_syncInterval);
  _syncInterval = setInterval(function(){
    if(hasUrl() && document.visibilityState === 'visible'){
      silentSync();
    }
  }, 30000);
}

// Silent sync — no notifications, just refresh data
async function silentSync(){
  if(!hasUrl()) return;
  if(Date.now() - _lastSaveTime < 15000) return; // skip if saved recently
  var deletedIds = JSON.parse(localStorage.getItem('cl_tasks_deleted')||'[]');
  try{
    var r = await gasCall('getAll');
    if(r.ok){
      var changed = false;
      if(Array.isArray(r.tasks)){
        var newJson = JSON.stringify(r.tasks.map(function(t){return t.id+t.stage+t.updatedAt;}).sort());
        var oldJson = JSON.stringify(TASKS.map(function(t){return t.id+t.stage+t.updatedAt;}).sort());
        if(newJson !== oldJson){
          TASKS = r.tasks.map(function(t){ if(t.due && !t.dueDate) t.dueDate=t.due; return t; }).filter(function(t){return deletedIds.indexOf(t.id)===-1;});
          saveTasks();
          changed = true;
        }
      }
      if(Array.isArray(r.clients) || Array.isArray(r.registrations) || Array.isArray(r.transactions) || Array.isArray(r.acknowledgements)){
        var clientMap = {};
        if(Array.isArray(r.clients)) r.clients.forEach(function(c){ var k=(c.fbName||'').trim().toLowerCase(); if(k) clientMap[k]=c; });
        if(Array.isArray(r.registrations)) r.registrations.forEach(function(reg){ var k=(reg.fbName||'').trim().toLowerCase(); if(k&&!clientMap[k]) clientMap[k]={fbName:reg.fbName,email:reg.email||'',type:reg.arrType||'walkin'}; });
        if(Array.isArray(r.transactions)) r.transactions.forEach(function(t){ var k=(t.clientName||'').trim().toLowerCase(); if(k&&!clientMap[k]) clientMap[k]={fbName:t.clientName,email:'',type:'walkin'}; });
        if(Array.isArray(r.acknowledgements)) r.acknowledgements.forEach(function(a){ var k=(a.fbName||'').trim().toLowerCase(); if(k&&!clientMap[k]) clientMap[k]={fbName:a.fbName,email:a.email||'',type:'booked'}; });
        CLIENTS = Object.keys(clientMap).map(function(k){ return clientMap[k]; });
        saveClients();
        updateClientCount();
      }
      if(changed) render();
      updateLastSync();
    }
  }catch(e){}
}

startAutoSync();

// Also sync when tab becomes visible (user switches back)
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible' && hasUrl()){
    silentSync();
  }
});
